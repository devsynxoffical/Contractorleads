# Railway deploy config for LeadFlow USA / Contractor Leads
# Dashboard: https://railway.app → New Project → Deploy from GitHub

[build]
builder = "NIXPACKS"
# Nixpacks already runs `npm ci` in install — do not run it again (EBUSY on node_modules/.cache)
buildCommand = "npm run build"

[deploy]
startCommand = "npx prisma db push && node scripts/start-railway.mjs"
restartPolicyType = "ON_FAILURE"
healthcheckPath = "/login"
healthcheckTimeout = 300
