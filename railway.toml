# Railway deploy config for LeadFlow USA / Contractor Leads
# Dashboard: https://railway.app → New Project → Deploy from GitHub
# Redeploy trigger: keep Nixpacks buildCommand in sync with package.json "build"

[build]
builder = "NIXPACKS"
# Nixpacks already runs `npm ci` in install — do not run it again (EBUSY on node_modules/.cache)
buildCommand = "npm run build"

[deploy]
# next start (via start-railway.mjs) — binds 0.0.0.0:$PORT; fails fast if DATABASE_URL missing
startCommand = "node scripts/start-railway.mjs"
restartPolicyType = "ON_FAILURE"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyMaxRetries = 10
