# Railway deploy config for LeadFlow USA / Contractor Leads
# Dashboard: https://railway.app → New Project → Deploy from GitHub
#
# Region must be a current Metal identifier. Old node id
# "asia-southeast1-eqsg3a" can fail validation — prefer asia-southeast1
# (Singapore). Config-as-code overrides the dashboard Scale → Regions value.

[build]
builder = "RAILPACK"
# Railpack / Nixpacks already installs deps — only run the app build here
buildCommand = "npm run build"

[deploy]
startCommand = "node scripts/start-railway.mjs"
restartPolicyType = "ON_FAILURE"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyMaxRetries = 10

# Force a valid Singapore region (overrides stale dashboard region)
[deploy.multiRegionConfig."asia-southeast1"]
numReplicas = 1
