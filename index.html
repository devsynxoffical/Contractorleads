<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contractor Leads</title>
    <meta http-equiv="refresh" content="2; url=/login" />
    <link rel="icon" href="/logo.png" type="image/png" />
    <style>
      :root {
        --magenta: #e6007e;
        --purple: #8e24aa;
        --ink: #14111a;
        --muted: #6a6474;
        --canvas: #f6f5f8;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--canvas);
        color: var(--ink);
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        text-align: center;
        background: #fff;
        border: 1px solid #ebe8ef;
        border-radius: 16px;
        padding: 40px 28px;
        box-shadow: 0 8px 28px rgba(142, 36, 170, 0.08);
      }
      img {
        width: 56px;
        height: 56px;
        object-fit: contain;
      }
      h1 {
        margin: 16px 0 8px;
        font-size: 1.35rem;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0;
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.5;
      }
      .btn {
        display: inline-block;
        margin-top: 24px;
        padding: 12px 22px;
        border-radius: 10px;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
        background: linear-gradient(135deg, var(--magenta), var(--purple));
      }
      .hint {
        margin-top: 20px;
        font-size: 0.8rem;
        color: #9b95a5;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/logo.png" alt="Contractor Leads" />
      <h1>Contractor Leads</h1>
      <p>Loading your workspace…</p>
      <a class="btn" href="/login">Continue to Sign In</a>
      <p class="hint">
        If this page stays here, open cPanel → Setup Node.js App → set startup
        file to <strong>app.js</strong> → Restart.
      </p>
    </div>
    <script>
      // Prefer client redirect when the Node app is live
      setTimeout(function () {
        window.location.replace("/login");
      }, 1500);
    </script>
  </body>
</html>
